<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners — OS applies its own mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Receipt card — kept inside safe zone (inner 80% = x:51, y:51, w:410, h:410) -->
  <rect x="146" y="96" width="220" height="270" rx="16" fill="white" fill-opacity="0.97"/>

  <!-- Receipt header -->
  <rect x="146" y="96" width="220" height="48" rx="16" fill="#6366f1"/>
  <rect x="146" y="120" width="220" height="24" fill="#6366f1"/>
  <text x="256" y="126" text-anchor="middle" fill="white"
    font-size="22" font-weight="800" font-family="system-ui,sans-serif">Split Karo</text>

  <!-- Item rows -->
  <rect x="168" y="162" width="76" height="9" rx="4" fill="#e0e7ff"/>
  <rect x="296" y="162" width="46" height="9" rx="4" fill="#818cf8"/>
  <rect x="168" y="184" width="60" height="9" rx="4" fill="#e0e7ff"/>
  <rect x="296" y="184" width="46" height="9" rx="4" fill="#818cf8"/>
  <rect x="168" y="206" width="88" height="9" rx="4" fill="#e0e7ff"/>
  <rect x="296" y="206" width="46" height="9" rx="4" fill="#818cf8"/>

  <!-- Dashed divider -->
  <line x1="158" y1="230" x2="354" y2="230"
    stroke="#c7d2fe" stroke-width="3" stroke-dasharray="9 6"/>

  <!-- Total -->
  <rect x="158" y="240" width="196" height="32" rx="7" fill="#eef2ff"/>
  <text x="174" y="261" fill="#6366f1"
    font-size="13" font-weight="700" font-family="system-ui,sans-serif">Total</text>
  <text x="338" y="261" text-anchor="end" fill="#4338ca"
    font-size="13" font-weight="800" font-family="system-ui,sans-serif">₹4,800</text>

  <!-- Zigzag -->
  <path d="M146 316 l13-12 l13 12 l13-12 l13 12 l13-12 l13 12 l13-12 l13 12 l13-12 l13 12 l13-12 l13 12 l13-12 l13 12"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Member avatars (inside safe zone) -->
  <circle cx="196" cy="400" r="34" fill="white" fill-opacity="0.18"/>
  <circle cx="256" cy="400" r="34" fill="white" fill-opacity="0.18"/>
  <circle cx="316" cy="400" r="34" fill="white" fill-opacity="0.18"/>
  <text x="196" y="409" text-anchor="middle" fill="white"
    font-size="22" font-weight="700" font-family="system-ui,sans-serif">R</text>
  <text x="256" y="409" text-anchor="middle" fill="white"
    font-size="22" font-weight="700" font-family="system-ui,sans-serif">P</text>
  <text x="316" y="409" text-anchor="middle" fill="white"
    font-size="22" font-weight="700" font-family="system-ui,sans-serif">A</text>
  <text x="226" y="407" text-anchor="middle" fill="white"
    font-size="16" fill-opacity="0.7" font-family="system-ui,sans-serif">÷</text>
  <text x="286" y="407" text-anchor="middle" fill="white"
    font-size="16" fill-opacity="0.7" font-family="system-ui,sans-serif">÷</text>
</svg>
