<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Split Karo</title>
  <script>
    // GitHub Pages SPA trick: encode the path into a query string and redirect
    // to index.html, which will restore the real URL via history.replaceState.
    // pathSegmentsToKeep = 1 because the app lives under /split_karo/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
